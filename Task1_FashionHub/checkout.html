<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FashionHub Checkout</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#ec4899;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#ec4899;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:0.9;
}

#totalAmount{
font-size:20px;
font-weight:bold;
text-align:center;
margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🛍️ Checkout</h1>

<div id="totalAmount"></div>
<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<input
type="tel"
id="phone"
placeholder="10-digit mobile number"
maxlength="10"
required>

<input
type="email"
id="email"
placeholder="example@gmail.com"
required>

<textarea
id="address"
placeholder="Enter delivery address"
required></textarea>

<textarea id="address"
placeholder="Delivery Address"
rows="4"></textarea>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<script>

const total =
localStorage.getItem("cartTotal") || 0;

document.getElementById("totalAmount")
.innerHTML = "Total Amount: ₹" + total;

function placeOrder(){

const name =
document.getElementById("name").value;

const phone =
document.getElementById("phone").value;

const address =
document.getElementById("address").value;

if(
name === "" ||
phone === "" ||
address === ""
){
alert("Please fill all fields");
return;
}

alert(
"🎉 Order Placed Successfully!\n\nThank you for shopping with FashionHub."
);

localStorage.removeItem("cartTotal");

window.location.href = "index.html";
}
</script>
<script src="script.js"></script>

</body>
</html>
